name: waggle_env
channels:
  - conda-forge
channel_priority: strict
dependencies:
  - python=3.12
  - pip
  - numpy
  - pandas
  - tqdm
  - opencv
  - libjpeg-turbo
  - libtiff
  - pip:
      - --index-url https://download.pytorch.org/whl/cu118
      - torch==2.7.1+cu118
      - torchvision==0.22.1+cu118
      - torchaudio==2.7.1+cu118
